system:
  active_preset: default
  ram_auto_switch_enabled: true
  ram_threshold_bytes: 1073741824
  presets:
    default:
      live_stream_mode: ws
      sensitivity: 4
      jpeg_quality: 70
      pipe_buffer_size: 1000000
      max_vel: 1.5
      bg_diff: 1000
      max_clip_length: 300
      motion_check_interval: 10
      min_free_storage_gb: 1
      rtsp_unified_demux_enabled: false
      frame_rbf_len: 3
      audio_rbf_len: 5
      results_rbf_len: 5
      mux_realtime: false
      auto_archive_days: 7
      enable_person_detection: false
      enable_yolox: true
      yolox_model_size: tiny
      yolox_score_thr: 0.3
      enable_pose: false
      pose_model_size: tiny
      pose_score_thr: 0.05
      enable_sub_blob: true
      tracker_multiprocess: true
    low_power:
      live_stream_mode: ws
      sensitivity: 2
      jpeg_quality: 55
      pipe_buffer_size: 1000000
      max_vel: 1.5
      bg_diff: 1000
      max_clip_length: 300
      motion_check_interval: 10
      min_free_storage_gb: 1
      rtsp_unified_demux_enabled: false
      frame_rbf_len: 3
      audio_rbf_len: 5
      results_rbf_len: 5
      mux_realtime: false
      auto_archive_days: 7
      enable_person_detection: false
      enable_yolox: false
      yolox_model_size: nano
      yolox_score_thr: 0.5
      enable_pose: false
      pose_model_size: tiny
      pose_score_thr: 0.3
      enable_sub_blob: true
      tracker_multiprocess: false
    custom:
      live_stream_mode: ws
      sensitivity: 4
      jpeg_quality: 70
      pipe_buffer_size: 1000000
      max_vel: 1.5
      bg_diff: 1000
      max_clip_length: 300
      motion_check_interval: 10
      min_free_storage_gb: 1
      rtsp_unified_demux_enabled: false
      frame_rbf_len: 3
      audio_rbf_len: 5
      results_rbf_len: 5
      mux_realtime: false
      auto_archive_days: 7
      enable_person_detection: false
      enable_yolox: true
      yolox_model_size: tiny
      yolox_score_thr: 0.3
      enable_pose: false
      pose_model_size: tiny
      pose_score_thr: 0.3
      enable_sub_blob: true
      tracker_multiprocess: false
  scene_analysis:
    enabled: true
    fight_threshold: 0.6
    burglary_threshold: 0.5
    cooldown_frames: 150
    min_persons_for_fight: 2
    proximity_distance_ratio: 2.0
    proximity_min_frames: 15
    trajectory_window: 30
    fight_weights:
      oscillation: 0.25
      entropy: 0.2
      approach_rate: 0.25
      proximity: 0.2
      bbox_variance: 0.1
    burglary_weights:
      loiter: 0.3
      zone_dwell: 0.3
      carried_object: 0.25
      threat_object: 0.15
    threat_classes:
    - knife
    - scissors
    - baseball bat
    carry_classes:
    - backpack
    - handbag
    - suitcase
    - bottle
    yolox_extra_classes:
    - 24
    - 26
    - 28
    - 34
    - 39
    - 43
    - 76

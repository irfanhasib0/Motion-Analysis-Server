# nginx reverse-proxy config for Motion Analysis Server
# Usage (standalone, without system nginx):
#   sudo nginx -c /root/Motion-Analysis-Server/api/nginx.conf
#
# Or place at /etc/nginx/sites-available/nvr and symlink to sites-enabled,
# then: sudo nginx -t && sudo systemctl reload nginx
#
# Start the backend with:
#   python backend/start_server.py --nginx

# Required top-level directives when using -c with a standalone file
user       irfan;
pid        ./nginx-nvr.pid;
error_log  ./nginx-nvr-error.log;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    ./nginx-nvr-access.log;
    sendfile      on;

    server {
        listen 3001;
        server_name _;          # replace with your domain or IP

        # ── React static build ────────────────────────────────────────────────────
        root /home/irfan/Desktop/Code/Motion-Analysis-Server/api/frontend/build;
        index index.html;

        # React Router SPA fallback — serve index.html for unknown paths
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── FastAPI (all /api/* endpoints) ────────────────────────────────────────
        location /api/ {
            proxy_pass         http://127.0.0.1:9001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── MJPEG / audio streams — must disable buffering ────────────────────────
        # Matches stream endpoints: /api/cameras/{id}/video_stream etc.
        location ~ ^/api/cameras/[^/]+/(video_stream|audio_stream|mjpeg) {
            proxy_pass         http://127.0.0.1:9001;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass             http://127.0.0.1:9001;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_read_timeout     86400s;    # keep alive for the lifetime of the tab
            proxy_send_timeout     86400s;
        }

        # ── HLS segments ──────────────────────────────────────────────────────────
        # Served directly from disk — faster than proxying through FastAPI.
        location /hls/ {
            alias /home/irfan/Desktop/Code/Motion-Analysis-Server/recordings/hls/;
            add_header Cache-Control "no-cache, no-store";
            add_header Access-Control-Allow-Origin *;
            types {
                application/vnd.apple.mpegurl  m3u8;
                video/mp2t                     ts;
            }
        }
    }
}

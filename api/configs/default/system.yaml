system:
  # System-level metadata only
  active_preset: default
  ram_auto_switch_enabled: true
  ram_threshold_bytes: 1073741824
  presets:
    default:
      live_stream_mode: mjpeg
      uvicorn_reload: true
      low_power_mode: false
      sensitivity: 4
      jpeg_quality: 70
      pipe_buffer_size: 100000000
      max_vel: 0.1
      bg_diff: 50
      max_clip_length: 60
      motion_check_interval: 10
      min_free_storage_bytes: 1073741824
      rtsp_unified_demux_enabled: false
      frame_rbf_len: 10
      audio_rbf_len: 10
      results_rbf_len: 10
      mux_realtime: false
      camera_start_timeout: 30  # Camera start operation timeout in seconds
    low_power:
      live_stream_mode: mjpeg
      uvicorn_reload: true
      low_power_mode: true
      sensitivity: 2
      jpeg_quality: 55
      pipe_buffer_size: 1000000
      max_vel: 0.1
      bg_diff: 50
      max_clip_length: 60
      motion_check_interval: 10
      min_free_storage_bytes: 1073741824
      rtsp_unified_demux_enabled: false
      frame_rbf_len: 5
      audio_rbf_len: 5
      results_rbf_len: 5
      mux_realtime: false
      camera_start_timeout: 45  # Extended timeout for low power mode
    custom:
      live_stream_mode: mjpeg
      uvicorn_reload: true
      low_power_mode: false
      sensitivity: 4
      jpeg_quality: 70
      pipe_buffer_size: 100000000
      max_vel: 0.1
      bg_diff: 50
      max_clip_length: 60
      motion_check_interval: 10
      min_free_storage_bytes: 1073741824
      rtsp_unified_demux_enabled: false
      frame_rbf_len: 10
      audio_rbf_len: 10
      results_rbf_len: 10
      mux_realtime: false

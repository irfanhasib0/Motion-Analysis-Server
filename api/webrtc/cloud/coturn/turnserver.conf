# Basic TURN/STUN
listening-port=3478
fingerprint
lt-cred-mech
realm=turn.example.com

# TURN REST auth (ephemeral credentials)
use-auth-secret
static-auth-secret=CHANGE_ME_LONG_RANDOM

# Relay ports (keep small for MVP)
min-port=49160
max-port=49200

# Prefer UDP but allow TCP fallback
no-tls
no-dtls

# Logging
verbose
log-file=stdout
